name: Super Automation

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  request-super:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: |
          sudo apt-get update && sudo apt-get install -y jq

      - name: Activate Super Duolingo
        run: |
          echo "🚀 Starting Super activation..."
          
          JWT="${{ secrets.DUOLINGO_TOKEN }}"
          if [ -z "$JWT" ]; then
            echo "❌ ERROR: DUOLINGO_TOKEN secret is not set"
            exit 1
          fi
          
          USER_ID=$(echo -n "$JWT" | cut -d'.' -f2 | base64 -d 2>/dev/null | jq -r '.sub' 2>/dev/null)
          
          if [ -z "$USER_ID" ] || [ "$USER_ID" = "null" ]; then
            echo "❌ ERROR: Failed to extract user ID from token"
            exit 1
          fi
          
          echo "👤 User ID: $USER_ID"
          
          # 1. СНАЧАЛА ПРОВЕРЯЕМ, ЕСТЬ ЛИ SUPER
          echo "📊 Checking current Super status..."
          PROFILE=$(curl -s -X GET "https://www.duolingo.com/2017-06-30/users/${USER_ID}" \
            -H "Authorization: Bearer ${JWT}" \
            -H "Content-Type: application/json")
          
          if echo "$PROFILE" | grep -q '"hasPlus": true'; then
            echo "✅ Super is already ACTIVE on your account!"
            echo "🎉 Nothing to do - you already have Super!"
            echo "✨ Super automation completed at: $(date -u '+%H:%M:%S UTC')"
            exit 0
          fi
          
          # 2. ЕСЛИ SUPER НЕТ - ПЫТАЕМСЯ АКТИВИРОВАТЬ
          echo "📤 Super not found. Attempting to activate 3 days of Super..."
          
          RESPONSE=$(curl -s -X POST "https://www.duolingo.com/2017-06-30/users/${USER_ID}/shop-items" \
            -H "Authorization: Bearer ${JWT}" \
            -H "Content-Type: application/json" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -H "Accept: application/json" \
            -H "Referer: https://www.duolingo.com/" \
            -H "Origin: https://www.duolingo.com" \
            -d "{
              \"itemName\": \"immersive_subscription\",
              \"productId\": \"com.duolingo.immersive_free_trial_subscription\",
              \"learningLanguage\": \"ja\",
              \"fromLanguage\": \"ru\"
            }")
          
          echo "📋 Server response:"
          echo "$RESPONSE" | jq '.' 2>/dev/null || echo "$RESPONSE"
          
          # 3. ПРОВЕРЯЕМ РЕЗУЛЬТАТ
          if echo "$RESPONSE" | grep -q '"purchaseId"'; then
            echo "✅ SUCCESS: Super Duolingo activated!"
            echo "🎉 3 days of Super should be active on your account"
            
          elif echo "$RESPONSE" | grep -q '"error"'; then
            ERROR_MSG=$(echo "$RESPONSE" | jq -r '.error // .message // "Unknown error"' 2>/dev/null)
            
            if echo "$ERROR_MSG" | grep -qi "already" || echo "$ERROR_MSG" | grep -qi "exist"; then
              echo "⏳ INFO: Super already active or previously redeemed"
            else
              echo "❌ ERROR: $ERROR_MSG"
              exit 1
            fi
            
          else
            # Если ответ пустой - значит Super уже есть (проверяем еще раз)
            echo "⏳ Empty response - checking Super status again..."
            PROFILE2=$(curl -s -X GET "https://www.duolingo.com/2017-06-30/users/${USER_ID}" \
              -H "Authorization: Bearer ${JWT}" \
              -H "Content-Type: application/json")
            
            if echo "$PROFILE2" | grep -q '"hasPlus": true'; then
              echo "✅ Super is now ACTIVE on your account!"
              echo "🎉 Activation successful!"
            else
              echo "⚠️  Super is still not active"
              echo "💡 This might mean:"
              echo "   - Free trial already used"
              echo "   - Trial not available in your region"
              echo "   - API endpoint changed"
              exit 1
            fi
          fi
          
          echo "✨ Super automation completed at: $(date -u '+%H:%M:%S UTC')"

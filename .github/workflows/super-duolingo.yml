name: Super Automation

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  request-super:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: |
          sudo apt-get update && sudo apt-get install -y jq

      - name: Activate Super Duolingo via Official API
        run: |
          echo "🚀 Starting Super activation..."
          
          JWT="${{ secrets.DUOLINGO_TOKEN }}"
          if [ -z "$JWT" ]; then
            echo "❌ ERROR: DUOLINGO_TOKEN secret is not set"
            exit 1
          fi
          
          # Получаем ID пользователя из JWT
          USER_ID=$(echo -n "$JWT" | cut -d'.' -f2 | base64 -d 2>/dev/null | jq -r '.sub' 2>/dev/null)
          
          if [ -z "$USER_ID" ] || [ "$USER_ID" = "null" ]; then
            echo "❌ ERROR: Failed to extract user ID from token"
            exit 1
          fi
          
          echo "👤 User ID: $USER_ID"
          echo "📤 Activating 3 days of Super Duolingo..."
          
          # Активация Super через официальное API (как в DuoRain)
          RESPONSE=$(curl -s -X POST "https://www.duolingo.com/2017-06-30/users/${USER_ID}/shop-items" \
            -H "Authorization: Bearer ${JWT}" \
            -H "Content-Type: application/json" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -H "Accept: application/json" \
            -H "Referer: https://www.duolingo.com/" \
            -H "Origin: https://www.duolingo.com" \
            -d '{
              "itemName": "immersive_subscription",
              "productId": "com.duolingo.immersive_free_trial_subscription"
            }')
          
          echo "📋 Server response:"
          echo "$RESPONSE" | jq '.' 2>/dev/null || echo "$RESPONSE"
          
          # Проверяем ответ
          if echo "$RESPONSE" | grep -q '"purchaseId"'; then
            echo "✅ SUCCESS: Super Duolingo activated!"
            echo "🎉 3 days of Super should be active on your account"
            echo "📌 Check your Duolingo account to confirm"
            
          elif echo "$RESPONSE" | grep -q '"error"'; then
            ERROR_MSG=$(echo "$RESPONSE" | jq -r '.error // .message // "Unknown error"' 2>/dev/null)
            
            if echo "$ERROR_MSG" | grep -qi "already" || echo "$ERROR_MSG" | grep -qi "exist"; then
              echo "⏳ INFO: Super already active or previously redeemed"
              echo "🔄 Next attempt will be tomorrow at 00:00 UTC"
            else
              echo "❌ ERROR: $ERROR_MSG"
              exit 1
            fi
            
          else
            # Если ответ не распознан, но не ошибка
            if [ -n "$RESPONSE" ] && [ "$RESPONSE" != "null" ]; then
              echo "⚠️  Response received (check above for details)"
              echo "ℹ️  Continuing execution..."
            else
              echo "❌ ERROR: No valid response from server"
              exit 1
            fi
          fi
          
          echo "✨ Super automation completed at: $(date -u '+%H:%M:%S UTC')"
          
      - name: Log completion
        run: |
          echo "📝 Log entry: Super automation ran"
          echo "Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Status: Request processed"
          echo "Next automatic run: Tomorrow at 00:00 UTC"

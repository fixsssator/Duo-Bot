name: Streak Automation

on:
  schedule:
    - cron: '10 */4 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  streak:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: |
          sudo apt-get update && sudo apt-get install -y jq

      - name: Farm Streak via Duolingo API
        run: |
          echo "🔥 Starting Streak farming..."
          
          JWT="${{ secrets.DUOLINGO_TOKEN }}"
          if [ -z "$JWT" ]; then
            echo "❌ ERROR: DUOLINGO_TOKEN secret is not set"
            exit 1
          fi
          
          USER_ID=$(echo -n "$JWT" | cut -d'.' -f2 | base64 -d 2>/dev/null | jq -r '.sub' 2>/dev/null)
          
          if [ -z "$USER_ID" ] || [ "$USER_ID" = "null" ]; then
            echo "❌ ERROR: Failed to extract user ID from token"
            exit 1
          fi
          
          echo "👤 User ID: $USER_ID"
          
          FROM_LANG="ru"
          TO_LANG="ja"
          TARGET_STREAK=10
          
          echo "📤 Farming $TARGET_STREAK streak days for Japanese..."
          
          # Получаем course_id для твоего языка
          get_course_id() {
            local profile=$(curl -s -X GET "https://www.duolingo.com/2017-06-30/users/${USER_ID}" \
              -H "Authorization: Bearer ${JWT}" \
              -H "Content-Type: application/json")
            
            echo "$profile" | jq -r '.courses[] | select(.learningLanguage == "'"$TO_LANG"'") | .id' 2>/dev/null | head -1
          }
          
          COURSE_ID=$(get_course_id)
          
          if [ -z "$COURSE_ID" ] || [ "$COURSE_ID" = "null" ]; then
            echo "⚠️  Could not find course ID, using default"
            COURSE_ID=""
          else
            echo "📚 Course ID: $COURSE_ID"
          fi
          
          send_streak_request() {
            # Пробуем создать сессию с courseId
            local session_payload='{
              "challengeTypes": ["assist","characterIntro","characterMatch","characterPuzzle","characterSelect","characterTrace","characterWrite","completeReverseTranslation","definition","dialogue","extendedMatch","extendedListenMatch","form","freeResponse","gapFill","judge","listen","listenComplete","listenMatch","match","name","listenComprehension","listenIsolation","listenSpeak","listenTap","orderTapComplete","partialListen","partialReverseTranslate","patternTapComplete","radioBinary","radioImageSelect","radioListenMatch","radioListenRecognize","radioSelect","readComprehension","reverseAssist","sameDifferent","select","selectPronunciation","selectTranscription","svgPuzzle","syllableTap","syllableListenTap","speak","tapCloze","tapClozeTable","tapComplete","tapCompleteTable","tapDescribe","translate","transliterate","transliterationAssist","typeCloze","typeClozeTable","typeComplete","typeCompleteTable","writeComprehension"],
              "fromLanguage": "'"$FROM_LANG"'",
              "isFinalLevel": false,
              "isV2": true,
              "juicy": true,
              "learningLanguage": "'"$TO_LANG"'",
              "smartTipsVersion": 2,
              "type": "GLOBAL_PRACTICE"
            }'
            
            # Добавляем courseId если есть
            if [ -n "$COURSE_ID" ] && [ "$COURSE_ID" != "null" ]; then
              session_payload=$(echo "$session_payload" | jq --arg cid "$COURSE_ID" '. + {courseId: $cid}')
            fi
            
            # Создаем сессию
            SESSION_RESPONSE=$(curl -s -X POST "https://www.duolingo.com/2017-06-30/sessions" \
              -H "Authorization: Bearer ${JWT}" \
              -H "Content-Type: application/json" \
              -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
              -H "Accept: application/json" \
              -d "$session_payload")
            
            SESSION_ID=$(echo "$SESSION_RESPONSE" | jq -r '.id' 2>/dev/null)
            
            if [ -z "$SESSION_ID" ] || [ "$SESSION_ID" = "null" ]; then
              echo "$SESSION_RESPONSE" | jq '.' 2>/dev/null || echo "$SESSION_RESPONSE"
              return 1
            fi
            
            # Завершаем сессию
            local now=$(date +%s)
            local yesterday=$((now - 86400))
            
            UPDATE_RESPONSE=$(curl -s -X PUT "https://www.duolingo.com/2017-06-30/sessions/${SESSION_ID}" \
              -H "Authorization: Bearer ${JWT}" \
              -H "Content-Type: application/json" \
              -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
              -H "Accept: application/json" \
              -d "{
                \"heartsLeft\": 5,
                \"startTime\": ${yesterday},
                \"endTime\": ${now},
                \"enableBonusPoints\": false,
                \"failed\": false,
                \"maxInLessonStreak\": 9,
                \"shouldLearnThings\": true
              }")
            
            if echo "$UPDATE_RESPONSE" | grep -q '"id"'; then
              return 0
            else
              return 1
            fi
          }
          
          TOTAL=0
          SUCCESS=0
          FAILED=0
          
          while [ $TOTAL -lt $TARGET_STREAK ]; do
            if send_streak_request; then
              TOTAL=$((TOTAL + 1))
              SUCCESS=$((SUCCESS + 1))
              echo "🔥 +1 streak day (${TOTAL}/${TARGET_STREAK})"
            else
              FAILED=$((FAILED + 1))
              echo "⚠️  Retrying... (${FAILED} failures)"
              sleep 3
            fi
            sleep 1
          done
          
          echo "📊 Results: ${SUCCESS} success, ${FAILED} failures"
          echo "✅ Total streak days farmed: ${TOTAL}"

name: Streak Automation

on:
  schedule:
    - cron: '10 */4 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  streak:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: |
          sudo apt-get update && sudo apt-get install -y jq

      - name: Farm Streak via Duolingo API (DuoRain method)
        run: |
          echo "🔥 Starting Streak farming..."
          
          JWT="${{ secrets.DUOLINGO_TOKEN }}"
          if [ -z "$JWT" ]; then
            echo "❌ ERROR: DUOLINGO_TOKEN secret is not set"
            exit 1
          fi
          
          USER_ID=$(echo -n "$JWT" | cut -d'.' -f2 | base64 -d 2>/dev/null | jq -r '.sub' 2>/dev/null)
          
          if [ -z "$USER_ID" ] || [ "$USER_ID" = "null" ]; then
            echo "❌ ERROR: Failed to extract user ID from token"
            exit 1
          fi
          
          echo "👤 User ID: $USER_ID"
          
          # Параметры как в DuoRain
          FROM_LANG="ru"
          TO_LANG="ja"
          TARGET_STREAK=10  # Меняй на любое число
          
          echo "📤 Farming $TARGET_STREAK streak days..."
          
          # Получаем информацию о текущем стрейке (как в DuoRain)
          get_streak_info() {
            local profile=$(curl -s -X GET "https://www.duolingo.com/2017-06-30/users/${USER_ID}" \
              -H "Authorization: Bearer ${JWT}" \
              -H "Content-Type: application/json")
            
            echo "$profile" | jq -r '.streakData.currentStreak.startDate // ""' 2>/dev/null
          }
          
          STREAK_START=$(get_streak_info)
          
          if [ -z "$STREAK_START" ] || [ "$STREAK_START" = "null" ] || [ "$STREAK_START" = "" ]; then
            echo "⚠️  No existing streak found, starting from today"
            STREAK_START=$(date -u +%Y-%m-%d)
          else
            echo "📅 Current streak started: $STREAK_START"
          fi
          
          # Функция отправки streak запроса (ТОЧНО как в DuoRain)
          send_streak_day() {
            local target_date=$1
            
            # Создаем сессию (как в DuoRain)
            local session_payload='{
              "challengeTypes": ["assist","characterIntro","characterMatch","characterPuzzle","characterSelect","characterTrace","characterWrite","completeReverseTranslation","definition","dialogue","extendedMatch","extendedListenMatch","form","freeResponse","gapFill","judge","listen","listenComplete","listenMatch","match","name","listenComprehension","listenIsolation","listenSpeak","listenTap","orderTapComplete","partialListen","partialReverseTranslate","patternTapComplete","radioBinary","radioImageSelect","radioListenMatch","radioListenRecognize","radioSelect","readComprehension","reverseAssist","sameDifferent","select","selectPronunciation","selectTranscription","svgPuzzle","syllableTap","syllableListenTap","speak","tapCloze","tapClozeTable","tapComplete","tapCompleteTable","tapDescribe","translate","transliterate","transliterationAssist","typeCloze","typeClozeTable","typeComplete","typeCompleteTable","writeComprehension"],
              "fromLanguage": "'"$FROM_LANG"'",
              "isFinalLevel": false,
              "isV2": true,
              "juicy": true,
              "learningLanguage": "'"$TO_LANG"'",
              "smartTipsVersion": 2,
              "type": "GLOBAL_PRACTICE"
            }'
            
            local session_response=$(curl -s -X POST "https://www.duolingo.com/2017-06-30/sessions" \
              -H "Authorization: Bearer ${JWT}" \
              -H "Content-Type: application/json" \
              -H "User-Agent: Duolingo-Storm/1.0" \
              -H "Accept: application/json" \
              -d "$session_payload")
            
            local session_id=$(echo "$session_response" | jq -r '.id' 2>/dev/null)
            
            if [ -z "$session_id" ] || [ "$session_id" = "null" ]; then
              echo "⚠️  Failed to create session"
              return 1
            fi
            
            # Конвертируем дату в timestamp (как в DuoRain)
            local start_ts=$(date -d "$target_date - 1 day" +%s 2>/dev/null || echo $(( $(date -u +%s) - 86400 )))
            local end_ts=$(date -d "$target_date" +%s 2>/dev/null || date -u +%s)
            
            # Завершаем сессию (как в DuoRain)
            local update_payload='{
              "heartsLeft": 5,
              "startTime": '"$start_ts"',
              "endTime": '"$end_ts"',
              "enableBonusPoints": false,
              "failed": false,
              "maxInLessonStreak": 9,
              "shouldLearnThings": true
            }'
            
            local update_response=$(curl -s -X PUT "https://www.duolingo.com/2017-06-30/sessions/${session_id}" \
              -H "Authorization: Bearer ${JWT}" \
              -H "Content-Type: application/json" \
              -H "User-Agent: Duolingo-Storm/1.0" \
              -H "Accept: application/json" \
              -d "$update_payload")
            
            if echo "$update_response" | grep -q '"id"'; then
              return 0
            else
              return 1
            fi
          }
          
          TOTAL=0
          SUCCESS=0
          FAILED=0
          
          # Вычисляем даты для фарма (как в DuoRain)
          CURRENT_DATE=$(date -u +%Y-%m-%d)
          FARM_DATE=$(date -d "$STREAK_START - 1 day" +%Y-%m-%d 2>/dev/null || echo "$STREAK_START")
          
          echo "⏳ Farming in progress..."
          
          while [ $TOTAL -lt $TARGET_STREAK ]; do
            if send_streak_day "$FARM_DATE"; then
              TOTAL=$((TOTAL + 1))
              SUCCESS=$((SUCCESS + 1))
              echo "🔥 +1 streak day (${TOTAL}/${TARGET_STREAK}) - Date: $FARM_DATE"
            else
              FAILED=$((FAILED + 1))
              echo "⚠️  Retrying... (${FAILED} failures)"
              sleep 2
              continue
            fi
            
            # Следующий день
            FARM_DATE=$(date -d "$FARM_DATE - 1 day" +%Y-%m-%d 2>/dev/null || echo "$(date -u +%Y-%m-%d)")
            sleep 0.5
          done
          
          echo "📊 Results: ${SUCCESS} success, ${FAILED} failures"
          echo "✅ Total streak days farmed: ${TOTAL}"
          echo "✨ Streak automation completed at: $(date -u '+%H:%M:%S UTC')"

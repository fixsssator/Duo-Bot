name: XP Automation

on:
  schedule:
    - cron: '5 */4 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send-xp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Farm XP via Duolingo API
        run: |
          echo "🚀 Starting XP farming..."
          
          JWT="${{ secrets.DUOLINGO_TOKEN }}"
          if [ -z "$JWT" ]; then
            echo "❌ ERROR: DUOLINGO_TOKEN secret is not set"
            exit 1
          fi
          
          # ТВОИ ПАРАМЕТРЫ (из твоего кода)
          FROM_LANG="ru"           # Родной язык
          TO_LANG="ja"             # Японский (как в твоем PAYLOAD)
          STORY_SLUG="fr-en-le-passeport"  # Стандартная история
          TARGET_XP=10000          # Как в твоем запросе
          
          echo "📤 Farming $TARGET_XP XP for Japanese..."
          
          # Функция запроса XP
          send_xp() {
            local bonus=$1
            local now=$(date +%s)
            local dur=$((RANDOM % 120 + 300))
            
            curl -s -X POST "https://stories.duolingo.com/api2/stories/${STORY_SLUG}/complete" \
              -H "Authorization: Bearer ${JWT}" \
              -H "Content-Type: application/json" \
              -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
              -H "Accept: application/json" \
              -d "{
                \"awardXp\": true,
                \"completedBonusChallenge\": true,
                \"fromLanguage\": \"${FROM_LANG}\",
                \"learningLanguage\": \"${TO_LANG}\",
                \"hasXpBoost\": false,
                \"illustrationFormat\": \"svg\",
                \"isFeaturedStoryInPracticeHub\": true,
                \"isLegendaryMode\": true,
                \"isV2Redo\": false,
                \"isV2Story\": false,
                \"masterVersion\": true,
                \"maxScore\": 0,
                \"score\": 0,
                \"happyHourBonusXp\": ${bonus},
                \"startTime\": ${now},
                \"endTime\": $((now + dur))
              }"
          }
          
          TOTAL=0
          REQS=0
          
          echo "⏳ Farming in progress..."
          
          # Основные запросы по 500 XP
          while [ $TOTAL -lt $((TARGET_XP - 30)) ]; do
            RESP=$(send_xp 469)
            AWARD=$(echo "$RESP" | grep -o '"awardedXp":[0-9]*' | grep -o '[0-9]*')
            
            if [ -z "$AWARD" ] || [ "$AWARD" = "0" ]; then
              echo "⚠️  Retrying..."
              sleep 2
              continue
            fi
            
            TOTAL=$((TOTAL + AWARD))
            REQS=$((REQS + 1))
            echo "✅ +${AWARD} XP (${TOTAL}/${TARGET_XP})"
            sleep 0.5
          done
          
          # Остаток
          REM=$((TARGET_XP - TOTAL))
          if [ $REM -gt 0 ]; then
            BONUS=$((REM - 30))
            [ $BONUS -lt 0 ] && BONUS=0
            [ $BONUS -gt 469 ] && BONUS=469
            
            RESP=$(send_xp $BONUS)
            AWARD=$(echo "$RESP" | grep -o '"awardedXp":[0-9]*' | grep -o '[0-9]*')
            
            if [ -n "$AWARD" ] && [ "$AWARD" != "0" ]; then
              TOTAL=$((TOTAL + AWARD))
              REQS=$((REQS + 1))
              echo "✅ +${AWARD} XP (${TOTAL}/${TARGET_XP})"
            fi
          fi
          
          echo "📊 Total: ${TOTAL} XP farmed in ${REQS} requests"
          echo "✨ XP automation completed at: $(date -u '+%H:%M:%S UTC')"
